<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Gestion Scolaire</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-5">
            <h3 class="text-center mb-4 fw-bold">🔒 Espace Sécurisé</h3>
            {% if form.errors %}<div class="alert alert-danger p-2 text-center">Identifiants incorrects.</div>{% endif %}
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3"><label class="form-label fw-bold">Nom d'utilisateur :</label><input type="text" class="form-control" name="username" required autofocus></div>
                <div class="mb-4"><label class="form-label fw-bold">Mot de passe :</label><input type="password" class="form-control" name="password" required></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">SE CONNECTER</button>
            </form>
        </div>
    </div>
</body>
</html>
